services:
    proxy:
        ports:
            - "127.0.0.1:80:80"

    mysql:
        ports:
            - "127.0.0.1:3306:3306"

    postfix:
        build:
            context: ./docker/postfix
        container_name: gpv1-postfix
        ports:
            - "8025:25"
        environment:
            - POSTFIX_MYHOSTNAME
        volumes:
            - ./logs/postfix:/var/log

    opendkim:
        build:
            context: ./docker/opendkim
            args:
                - OPENDKIM_KEY
        container_name: gpv1-opendkim
        environment:
            - OPENDKIM_SELECTOR
            - POSTFIX_MYHOSTNAME
        volumes:
            - ./logs/opendkim:/var/log
